name: sayt/summary
description: |
  Post a buildx cache-hit summary to the job summary and upload a
  `.dockerbuild` artifact for sayt/integrate jobs. One headline line by
  default; `debug: 'true'` adds a misses table + per-record breakdown.
  Intra-record chain-ID divergence is ALWAYS checked and fails the step —
  it's always a bug. Call with `if: always()`.
inputs:
  name:
    description: Project label for the summary heading + artifact suffix (keep it short).
    required: true
  builder:
    description: |
      buildx builder name (the `name` output of setup-buildx-action). Empty
      falls back to the daemon default, which has no build history.
    required: false
    default: ""
  artifact-prefix:
    description: |
      Artifact filename prefix. Defaults to `<owner>~<repo>~` — the shape the
      GHA Build Summary widget recognizes.
    required: false
    default: ""
  debug:
    description: |
      `'true'` expands the summary with the misses table and per-record
      breakdown. Default keeps just the headline. (Chain-ID divergence is
      always checked regardless and fails the step.)
    required: false
    default: "false"
runs:
  using: composite
  steps:
    # Resolve the artifact path up front; the upload step always points here
    # and `if-no-files-found: ignore` keeps the job green when export fails.
    - name: Resolve artifact path
      id: artifact
      shell: bash
      env:
        ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
        SAYT_SUMMARY_NAME: ${{ inputs.name }}
      run: |
        prefix="$ARTIFACT_PREFIX"
        if [ -z "$prefix" ]; then
          repo="${GITHUB_REPOSITORY:-unknown/unknown}"
          owner="${repo%%/*}"
          reponame="${repo##*/}"
          prefix="${owner}~${reponame}~"
        fi
        path="${RUNNER_TEMP:-/tmp}/sayt-summary-${SAYT_SUMMARY_NAME}.dockerbuild"
        {
          echo "name=${prefix}${SAYT_SUMMARY_NAME}.dockerbuild"
          echo "path=$path"
        } >> "$GITHUB_OUTPUT"

    - name: Compute cache-hit summary
      shell: bash
      env:
        BUILDX_BUILDER: ${{ inputs.builder }}
        SAYT_SUMMARY_NAME: ${{ inputs.name }}
        SAYT_SUMMARY_OUT: ${{ steps.artifact.outputs.path }}
        SAYT_SUMMARY_DEBUG: ${{ inputs.debug }}
      run: |
        set -u
        name="$SAYT_SUMMARY_NAME"
        debug="$SAYT_SUMMARY_DEBUG"

        # `docker buildx history ls --format json` returns JSONL with one
        # record per build, including summary fields (cached_steps,
        # completed_steps, total_steps, created_at, completed_at). Avoids
        # the truncation of the default table view.
        ls_json=$(docker buildx history ls --format json 2>/dev/null || true)
        refs=$(echo "$ls_json" | jq -r 'select(.ref) | .ref' 2>/dev/null || true)
        if [ -z "$refs" ]; then
          {
            echo "## ${name} bake cache summary"
            echo ""
            echo "_(no build records — bake step likely failed before reaching buildkit)_"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        echo "::group::docker buildx history ls --format json"
        echo "$ls_json"
        echo "::endgroup::"

        # Pull each ref's rawjson once and stash in a tmpdir.
        tmpdir=$(mktemp -d)
        for ref in $refs; do
          uid="${ref##*/}"
          if out=$(docker buildx history logs --progress rawjson "$uid" 2>&1); then
            printf '%s\n' "$out" | awk '/^\{/' > "$tmpdir/$uid.rawjson"
          else
            : > "$tmpdir/$uid.rawjson"
          fi
        done

        # jq prelude. A "build step" = a RUN/ADD vertex — the instructions that
        # do real, cacheable compute. COPY is deliberately excluded: COPY layers
        # are cheap data movement whose cache state is inherently noisy. Implicit
        # parent-directory creation stamps a build-time mtime, so the
        # materialized layer digest floats run-to-run even when the copied
        # content is identical — yet the cross-stage content key that downstream
        # consumers key off is mtime-insensitive, so the float is harmless. We
        # don't cache COPY layers (no cross-builder cache; depot uses its
        # builder-native cache; plain buildkit caches the RUN layers that
        # matter), and a COPY that genuinely changed something always surfaces as
        # a miss on the RUN that consumes it — so excluding COPY cannot hide a
        # real regression. Hit = any event in the step's vertex group is cached
        # (duration is unreliable: cache-mount RUNs take time on hits).
        #
        # The synthetic clamp RUN (`find /monorepo -newer /tmp/ref … touch`) is a
        # cacheable step like any other, so it's counted: a clamp that starts
        # missing is the leading edge of a ci-RUN cascade. Group_by(.name) keeps
        # each project's clamp distinct (the _ctxs vertex names are
        # project-qualified through their federation parent).
        jq_filter='
          def steps:
            [.[]?.vertexes // []] | flatten
            | map(select((.name // "") | test("^\\[[^\\]]+ [0-9]+/[0-9]+\\] (RUN|ADD) ")))
            | group_by(.name)
            | map({name: .[0].name,
                   cached: (any(.[]; .cached == true)),
                   started: ([.[] | select(.started)][0].started // null),
                   dur: (if (any(.[]; .started) and any(.[]; .completed))
                         then (([.[] | select(.completed)][0].completed
                                | sub("\\.[0-9]+Z$"; "Z") | fromdate)
                              - ([.[] | select(.started)][0].started
                                | sub("\\.[0-9]+Z$"; "Z") | fromdate))
                         else null end)});
        '

        # Roll up across all records (per-record dedup by name; no cross-record
        # dedup — each record is its own bake invocation/scope).
        parsed=$(cat "$tmpdir"/*.rawjson 2>/dev/null | jq -rs "$jq_filter"'
          steps as $real
          | ($real | map(select(.cached == false))) as $misses
          | { total: ($real | length),
              hit:   (($real | length) - ($misses | length)),
              misses: ($misses | sort_by(.started // "")) }
        ' 2>/dev/null || echo '{}')
        total=$(echo  "$parsed" | jq -r '.total // 0')
        hit=$(echo    "$parsed" | jq -r '.hit   // 0')
        n_misses=$(echo "$parsed" | jq -r '.misses | length // 0')
        n_refs=$(echo "$refs" | wc -l | tr -d ' ')

        # Headline — always emitted.
        {
          echo "## ${name} bake cache summary"
          echo ""
          if [ "$total" -gt 0 ]; then
            pct=$((hit * 100 / total))
            marker=$([ "$hit" = "$total" ] && echo "✅" || echo "⚠️")
            echo "${marker} **${hit}/${total}** Dockerfile build steps hit cache (${pct}%) across **${n_refs}** build records."
          else
            echo "_(no Dockerfile build steps found — bake graph was entirely \`[internal]\` ops?)_"
          fi
          echo ""
          echo "<details><summary>How the count is computed</summary>"
          echo ""
          echo "A **Dockerfile build step** is a vertex whose name matches \`[target stage N/M] (RUN|ADD) ...\` — the instructions that do real, cacheable compute. Metadata-only instructions (FROM, WORKDIR, ENV, LABEL, etc.) and \`[internal]\` ops are excluded; buildkit emits vertices for them but doesn't mark \`cached:true\` even on a true no-op. **\`COPY\` is excluded too**: COPY layers are cheap data movement, and their cache state is inherently noisy — implicit parent-directory creation stamps a build-time mtime, so the materialized layer digest floats run-to-run even when the copied content is identical. We don't cache COPY layers (no cross-builder cache; depot uses its builder-native cache; plain buildkit caches the RUN layers that matter), and a COPY that genuinely changed something always surfaces as a miss on the RUN that consumes it — so excluding COPY cannot hide a real regression. The bayt synthetic mtime-clamp RUN (\`find /monorepo -newer /tmp/ref …\`) **is** counted: synthetics carry project-qualified cache tags and \`mode=max\`, so the clamp caches on warm like any other step — a clamp that starts missing is the leading edge of a ci-RUN cascade, exactly what this metric should surface. A **hit** means buildkit's \`cached\` flag is true for at least one event in this step's vertex group."
          echo ""
          echo "</details>"
        } | tee -a "$GITHUB_STEP_SUMMARY"

        # Chain-ID divergence (intra-record) — ALWAYS checked; it fails the step
        # (below) because it is always a bug: one logical stage computed under two
        # distinct chain IDs with differing cache outcomes means cache-from can
        # match at most one. Same-state duplicates are emission noise; skipped.
        # The loop is per-record, so cross-record divergence (outer LOCAL bake vs.
        # inner DEPOT bake — different builders, never a shared chain ID) is
        # excluded by construction: expected, not a bug. The synthetic clamp RUN
        # (`find /monorepo -newer /tmp/ref …`) is excluded HERE: the shared `_ctxs`
        # stage is reached through many federation parents (every consumer's
        # build_srcs, the ci target, …), so one `[<parent> <stage>_ctxs N/N]` name
        # legitimately maps to several vertex IDs/digests with differing cache
        # outcomes. That is the federation graph, not a chain-ID bug — counting it
        # would false-positive the divergence gate. (The hit metric DOES count the
        # clamp; group_by + any-cached collapses the collision harmlessly there.)
        divergence=""
        for f in "$tmpdir"/*.rawjson; do
          [ -s "$f" ] || continue
          rec_div=$(jq -rs '
            [.[]?.vertexes // []] | flatten
            | map(select(((.name // "") | test("^\\[[^\\]]+ [0-9]+/[0-9]+\\] (RUN|ADD) "))
                         and (((.name // "") | test("find /monorepo -newer /tmp/ref")) | not)))
            | group_by(.name)
            | map({name: .[0].name,
                   per_digest: (group_by(.digest)
                                | map({digest: .[0].digest,
                                       cached: any(.[]; .cached == true)}))})
            | map(select((.per_digest | length) > 1))
            | map(select((.per_digest | map(.cached) | unique | length) > 1))
            | .[]
            | "| `\(.name)` | \(.per_digest | length) | \(.per_digest | map("\(.digest) (cached=\(.cached))") | join("<br>")) |"
          ' "$f" 2>/dev/null || true)
          [ -n "$rec_div" ] && divergence+="$rec_div"$'\n'
        done
        if [ -n "$divergence" ]; then
          {
            echo ""
            echo "### ❌ Chain-ID divergence — same stage, different cached state (intra-record)"
            echo ""
            echo "<sub>One logical step computed under two distinct chain IDs with differing cache outcomes — \`cache-from\` in the next run can match at most one of them. **This is always a bug and fails the job.** Cross-record divergence (outer local bake vs. inner depot bake) is excluded by construction — different builders, never a shared chain ID.</sub>"
            echo ""
            echo "| stage | distinct digests | digests |"
            echo "| --- | --- | --- |"
            echo "$divergence"
          } | tee -a "$GITHUB_STEP_SUMMARY"
        fi

        # Debug sections (gated on debug): misses table, per-record breakdown.
        if [ "$debug" = "true" ]; then
          misses=$(echo "$parsed" | jq -r '.misses[]? | "| `\(.name)` | \(.started) | \(.dur)s |"')

          # Per-record rows: same hit/total filter, one rawjson at a time,
          # joined to ls_json (by uid) for the record name + timing.
          per_record_rows=""
          for f in "$tmpdir"/*.rawjson; do
            [ -s "$f" ] || continue
            ruid=$(basename "$f" .rawjson)
            meta=$(echo "$ls_json" | jq -c --arg uid "$ruid" 'select(.ref | endswith($uid))' | head -n 1)
            if [ -z "$meta" ]; then
              rec_name="(record $ruid)"
              rec_created="—"
              rec_dur="—"
            else
              rec_name=$(jq -r '.name' <<<"$meta")
              rec_created=$(jq -r '.created_at' <<<"$meta")
              rec_dur=$(jq -r '
                def to_epoch: sub("\\.[0-9]+Z$"; "Z") | fromdate;
                if .completed_at and .created_at
                then (((.completed_at | to_epoch) - (.created_at | to_epoch)) | tostring + "s")
                else "—" end' <<<"$meta")
            fi
            ht=$(jq -rs "$jq_filter"'
              steps
              | "\(map(select(.cached)) | length)/\(length)"' "$f" 2>/dev/null || echo "?/?")
            per_record_rows+="| \`$rec_name\` | $ht | $rec_dur | $rec_created |"$'\n'
          done

          {
            if [ "$n_misses" -gt 0 ]; then
              echo ""
              echo "### Misses (${n_misses}, chain order)"
              echo ""
              echo "| step | started | duration |"
              echo "| --- | --- | --- |"
              echo "$misses"
            fi

            echo ""
            echo "### Per-record summary (${n_refs} build records)"
            echo ""
            echo "| record | hit / total | record duration | created |"
            echo "| --- | --- | --- | --- |"
            printf '%s' "$per_record_rows" | sort
          } | tee -a "$GITHUB_STEP_SUMMARY"
        fi

        # Export the newest record as the .dockerbuild for the GHA widget (one
        # record per artifact). Its own "X/Y cached" header underreports — the
        # headline above is the truth.
        for ref in $refs; do
          uid="${ref##*/}"
          if err=$(docker buildx history export --output "$SAYT_SUMMARY_OUT" "$uid" 2>&1); then
            echo "exported $uid to $SAYT_SUMMARY_OUT"
            break
          else
            printf 'history export failed for %s: %s\n' "$uid" "$err"
          fi
        done

        # Chain-ID divergence is always a bug → fail the job. The table is in the
        # summary above; export ran first so the .dockerbuild still uploads.
        if [ -n "$divergence" ]; then
          echo "::error::sayt/summary (${name}): chain-ID divergence detected — always a bug. See the job summary."
          exit 1
        fi

    - name: Upload Build Summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact.outputs.name }}
        path: ${{ steps.artifact.outputs.path }}
        if-no-files-found: ignore
