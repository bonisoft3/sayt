name: sayt/integrate
description: |
  Build + run a project's integration flow via docker compose + buildx bake.
  Sets up host docker-in-docker plumbing so build sandboxes reach a daemon.
inputs:
  target-dir:
    description: Directory containing compose.yaml for the integration flow.
    required: false
    default: "."
  mode:
    description: |
      `compose` (default): the action drives bake + the digest-marker cache +
      compose-up (your `integrate` service is the test runner; honors the
      cache-* inputs). `bake`: run `just sayt integrate --bake` so the bake
      graph's own `ci`-style target drives the cascade and its `x-bake` refs
      do the caching. Usually selected for you by `sayt/ci`.
    required: false
    default: "compose"
  debug:
    description: Enable extra debug logging for bake/cache.
    required: false
    default: "false"
  buildkitd-flags:
    description: Optional extra buildkitd flags (appended to defaults).
    required: false
    default: ""
  buildkitd-config-inline:
    description: |
      Optional inline TOML buildkitd config (appended). Use to raise gRPC
      limits for large bake graphs (`[grpc] max_recv_msg_size = ...`).
    required: false
    default: ""
  distro-path:
    description: Passthrough to `sayt/install`. Empty skips the install step.
    required: false
    default: ""
  buildkit-syntax:
    description: |
      External dockerfile frontend ref (BUILDKIT_SYNTAX build-arg). Empty
      (default) uses the builder's built-in frontend. `sayt/depot` sets it.
    required: false
    default: ""
  target:
    description: |
      Compose service (compose mode) or bake target (bake mode) to build + run.
      `sayt/ci` passes `ci`.
    required: false
    default: "integrate"
  cache:
    description: |
      `true` (default): drive the digest-probe + marker + compose-up cache
      dance. `false`: bake + compose-up directly and let the compose's
      `x-bake.cache-*` do the caching.
    required: false
    default: "true"
  cache-scope:
    description: |
      Scope prefix for the default `cache-from`/`cache-to` (e.g. `pr-1261`).
      Empty disables the defaults (no cache wiring unless they're set).
    required: false
    default: ""
  cache-from:
    description: |
      Bake `cache-from` specs (newline-separated). Empty + `cache-scope` set →
      GHA per-scope + main fallback; empty + no scope → compose `x-bake` wins.
    required: false
    default: ""
  cache-to:
    description: |
      Bake `cache-to` spec. Empty + `cache-scope` set → GHA `mode=max`; empty +
      no scope → compose `x-bake` wins. Phase 2 always wipes it (read-only).
    required: false
    default: ""
  cache-target-pattern:
    description: |
      Target glob the cache wiring applies to. Default: the single `target`;
      set `*` for multi-target cascades.
    required: false
    default: ""
  summary-name:
    description: |
      Label for the cache-hit summary + `.dockerbuild` artifact. Defaults to
      the `target-dir` basename.
    required: false
    default: ""
runs:
  using: composite
  steps:
    # Pin mtimes to a fixed instant so layer/digest computation is deterministic.
    - name: Pin mtimes
      shell: bash
      run: find . -name .git -prune -o -exec touch -h -d "2000-01-01T00:00:00Z" {} +

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        # Pin buildkit by digest: cache-key determinism needs identical
        # buildkit across runs. Bump deliberately.
        driver-opts: image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
        # mirror.gcr.io: dodge Docker Hub's anonymous pull cap on buildkit pulls.
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]
          ${{ inputs.buildkitd-config-inline }}

    # ===== bake mode: delegate host setup + bake walk to integrate.nu. =====
    - name: Install sayt
      if: ${{ inputs.mode == 'bake' && inputs.distro-path != '' }}
      uses: bonisoft3/sayt/.github/actions/sayt/install@v0.14.0
      with:
        distro-path: ${{ inputs.distro-path }}

    - name: Install mise
      if: ${{ inputs.mode == 'bake' }}
      uses: jdx/mise-action@v2

    - name: just sayt integrate --bake
      if: ${{ inputs.mode == 'bake' }}
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      env:
        BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        BUILDX_BAKE_ENTITLEMENTS_FS: "0"
        SOURCE_DATE_EPOCH: "0"
        SAYT_BUILDKIT_SYNTAX: ${{ inputs.buildkit-syntax }}
      run: |
        just sayt integrate --bake --builder ${{ steps.buildx.outputs.name }} --target ${{ inputs.target }}

    # ===== compose mode (default): socat-bridge the host daemon to TCP and
    # export the buildx instance + docker auth so sandboxes reach it. Carry the
    # endpoint as DOCKER_HOST_TCP, not DOCKER_HOST (which would break the outer
    # bake on macOS); the sandbox re-exports it to $DOCKER_HOST. =====
    - name: Capture host docker-in-docker plumbing
      if: ${{ inputs.mode == 'compose' }}
      id: socat
      shell: bash
      run: |
        # host-ip via a one-off busybox on host network (pinned for reproducibility).
        host_ip=$(docker run --rm --network=host busybox:musl@sha256:03db190ed4c1ceb1c55d179a0940e2d71d42130636a780272629735893292223 hostname -i | awk '{print $1}')
        socat_id=$(docker run -d \
          -v /var/run/docker.sock:/var/run/docker.sock \
          --network=host \
          alpine/socat:1.8.0.0@sha256:a6be4c0262b339c53ddad723cdd178a1a13271e1137c65e27f90a08c16de02b8 \
          -d0 'TCP-LISTEN:2375,fork,backlog=1024,reuseaddr' UNIX-CONNECT:/var/run/docker.sock)
        echo "id=$socat_id" >> "$GITHUB_OUTPUT"
        echo "docker_host=tcp://${host_ip}:2375" >> "$GITHUB_OUTPUT"
        echo "BUILDX_BUILDER=${{ steps.buildx.outputs.name }}" >> "$GITHUB_ENV"
        # Export the buildx instance + docker auth as compose secrets for the
        # sandbox. CI-only: assumes the Linux unix:// instance endpoint (macOS
        # Docker Desktop would need a host-side rewrite).
        instance="$HOME/.docker/buildx/instances/${{ steps.buildx.outputs.name }}"
        if [ -f "$instance" ]; then
          {
            echo "BUILDX_INSTANCE<<BUILDX_INSTANCE_EOF"
            cat "$instance"
            echo
            echo "BUILDX_INSTANCE_EOF"
          } >> "$GITHUB_ENV"
        fi
        config="$HOME/.docker/config.json"
        if [ -f "$config" ]; then
          {
            echo "DOCKER_AUTH_CONFIG<<DOCKER_AUTH_CONFIG_EOF"
            cat "$config"
            echo
            echo "DOCKER_AUTH_CONFIG_EOF"
          } >> "$GITHUB_ENV"
        fi

    # Flatten with `docker compose config -o` before bake — sidesteps
    # bake-on-federated-compose context-doubling + service-collision bugs.
    - name: Flatten compose graph
      if: ${{ inputs.mode == 'compose' }}
      id: flatten
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      run: |
        flat="${RUNNER_TEMP:-/tmp}/sayt-integrate-flat-compose.yaml"
        docker compose config -o "$flat"
        echo "flat=$flat" >> "$GITHUB_OUTPUT"

    # Build per-phase --set lines. Empty cache-from/to + scope set → GHA
    # defaults; empty + no scope → hand off to compose x-bake. Phase 2 always
    # wipes cache-to (read-only: its writes would drift next run's digest).
    - name: Compute cache wiring
      if: ${{ inputs.mode == 'compose' && inputs.cache != 'false' }}
      id: cache-wiring
      shell: bash
      env:
        CACHE_SCOPE: ${{ inputs.cache-scope }}
        CACHE_FROM_INPUT: ${{ inputs.cache-from }}
        CACHE_TO_INPUT: ${{ inputs.cache-to }}
        TARGET: ${{ inputs.target }}
        CACHE_TARGET_PATTERN: ${{ inputs.cache-target-pattern }}
      run: |
        cache_from="$CACHE_FROM_INPUT"
        cache_to="$CACHE_TO_INPUT"
        target_pattern="${CACHE_TARGET_PATTERN:-$TARGET}"
        if [ -z "$cache_from" ] && [ -n "$CACHE_SCOPE" ]; then
          cache_from=$(printf 'type=gha,scope=%s-%s\ntype=gha,scope=main-%s\n' \
            "$CACHE_SCOPE" "$TARGET" "$TARGET")
        fi
        if [ -z "$cache_to" ] && [ -n "$CACHE_SCOPE" ]; then
          cache_to="type=gha,scope=${CACHE_SCOPE}-${TARGET},mode=max"
        fi
        p1=""
        p2=""
        while IFS= read -r line; do
          line="$(printf '%s' "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -n "$line" ]; then
            p1+="${target_pattern}.cache-from=${line}"$'\n'
            p2+="${target_pattern}.cache-from=${line}"$'\n'
          fi
        done <<< "$cache_from"
        if [ -n "$cache_to" ]; then
          p1+="${target_pattern}.cache-to=${cache_to}"$'\n'
        fi
        p2+="*.cache-to="$'\n'
        {
          echo "p1<<PHASE1_EOF"
          printf '%s' "$p1"
          echo "PHASE1_EOF"
          echo "p2<<PHASE2_EOF"
          printf '%s' "$p2"
          echo "PHASE2_EOF"
        } >> "$GITHUB_OUTPUT"

    # Phase 1 — digest probe: produces the per-target digest (the marker key)
    # and fills the local content store; phase 2 loads from it.
    - name: Build integrate target — digest probe
      if: ${{ inputs.mode == 'compose' && inputs.cache != 'false' }}
      id: bake
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: ${{ steps.flatten.outputs.flat }}
        targets: ${{ inputs.target }}
        load: false  # phase 2's job
        allow: |
          fs.read=${{ github.workspace }}
        # rewrite-timestamp + BUILDKIT_SYNTAX must match phase 2's, or the
        # digest (and the marker) drifts.
        set: |
          *.output=type=image,push=false,rewrite-timestamp=true
          ${{ inputs.buildkit-syntax != '' && format('*.args.BUILDKIT_SYNTAX={0}', inputs.buildkit-syntax) || '' }}
          ${{ steps.cache-wiring.outputs.p1 }}
        provenance: false
        sbom: false
      env:
        SOURCE_DATE_EPOCH: "0"
        DOCKER_HOST_TCP: ${{ steps.socat.outputs.docker_host }}

    # Marker key = sha256 of the per-target digest map. Via tempfile, not env:
    # the metadata can exceed ARG_MAX.
    - name: Compute digest hash
      if: ${{ inputs.mode == 'compose' && inputs.cache != 'false' }}
      id: digest
      shell: bash
      run: |
        metadata_file="${RUNNER_TEMP:-/tmp}/sayt-integrate-bake-metadata.json"
        cat > "$metadata_file" <<'SAYT_BAKE_METADATA_EOF'
        ${{ steps.bake.outputs.metadata }}
        SAYT_BAKE_METADATA_EOF
        if [ ! -s "$metadata_file" ] || [ "$(head -c1 "$metadata_file")" != "{" ]; then
          echo "::warning::bake-action produced no/invalid metadata output; skipping cache wiring."
          exit 0
        fi
        hash=$(jq -S 'to_entries
                      | map({k: .key, d: (.value."containerimage.digest" // null)})
                      | sort_by(.k)' "$metadata_file" \
               | sha256sum | cut -d' ' -f1)
        echo "computed digest hash: $hash"
        echo "SAYT_INTEGRATE_DIGEST_HASH=$hash" >> "$GITHUB_ENV"

    - name: Restore passed marker
      if: ${{ inputs.mode == 'compose' && inputs.cache != 'false' && env.SAYT_INTEGRATE_DIGEST_HASH != '' }}
      id: marker
      uses: actions/cache/restore@v4
      with:
        path: ${{ runner.temp }}/sayt-integrate-passed
        key: integrate-passed-${{ runner.os }}-${{ runner.arch }}-${{ env.SAYT_INTEGRATE_DIGEST_HASH }}

    # Phase 2 — load the image for `compose up`; only on marker miss.
    - name: Build integrate target — load image
      if: ${{ inputs.mode == 'compose' && inputs.cache != 'false' && steps.marker.outputs.cache-hit != 'true' }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: ${{ steps.flatten.outputs.flat }}
        targets: ${{ inputs.target }}
        load: true
        allow: |
          fs.read=${{ github.workspace }}
        # Read-only: cache-to is wiped (cache-wiring p2) so writes don't drift
        # the digest. BUILDKIT_SYNTAX must match phase 1's.
        set: |
          *.output=type=docker,rewrite-timestamp=true
          ${{ inputs.buildkit-syntax != '' && format('*.args.BUILDKIT_SYNTAX={0}', inputs.buildkit-syntax) || '' }}
          ${{ steps.cache-wiring.outputs.p2 }}
        provenance: false
        sbom: false
      env:
        SOURCE_DATE_EPOCH: "0"
        DOCKER_HOST_TCP: ${{ steps.socat.outputs.docker_host }}

    # No --build: bake already produced the image; rebuilding here would risk
    # a different digest and defeat the marker.
    - name: Run integration tests
      if: ${{ inputs.mode == 'compose' && inputs.cache != 'false' && steps.marker.outputs.cache-hit != 'true' }}
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      env:
        BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        DOCKER_HOST_TCP: ${{ steps.socat.outputs.docker_host }}
      run: >-
        docker compose up
        ${{ inputs.target }}
        --abort-on-container-failure
        --exit-code-from ${{ inputs.target }}
        --force-recreate
        --renew-anon-volumes
        --remove-orphans
        --attach-dependencies

    # Save marker only on success of an actual test-step run.
    - name: Touch passed marker
      if: ${{ success() && inputs.mode == 'compose' && inputs.cache != 'false' && env.SAYT_INTEGRATE_DIGEST_HASH != '' && steps.marker.outputs.cache-hit != 'true' }}
      shell: bash
      run: touch "${{ runner.temp }}/sayt-integrate-passed"

    - name: Save passed marker
      if: ${{ success() && inputs.mode == 'compose' && inputs.cache != 'false' && env.SAYT_INTEGRATE_DIGEST_HASH != '' && steps.marker.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ${{ runner.temp }}/sayt-integrate-passed
        key: integrate-passed-${{ runner.os }}-${{ runner.arch }}-${{ env.SAYT_INTEGRATE_DIGEST_HASH }}

    # cache: false — bake directly so the compose's own x-bake.cache-* drives
    # it. `compose up --build` would use the legacy path and ignore x-bake.
    - name: Bake target (no action-driven cache)
      if: ${{ inputs.mode == 'compose' && inputs.cache == 'false' }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: ${{ steps.flatten.outputs.flat }}
        targets: ${{ inputs.target }}
        load: true
        allow: |
          fs.read=${{ github.workspace }}
        set: |
          ${{ inputs.buildkit-syntax != '' && format('*.args.BUILDKIT_SYNTAX={0}', inputs.buildkit-syntax) || '' }}
      env:
        DOCKER_HOST_TCP: ${{ steps.socat.outputs.docker_host }}

    - name: Compose up (no action-driven cache)
      if: ${{ inputs.mode == 'compose' && inputs.cache == 'false' }}
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      env:
        BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        DOCKER_HOST_TCP: ${{ steps.socat.outputs.docker_host }}
      run: >-
        docker compose up
        ${{ inputs.target }}
        --abort-on-container-failure
        --exit-code-from ${{ inputs.target }}
        --force-recreate
        --renew-anon-volumes
        --remove-orphans
        --attach-dependencies

    # Tear down the socat container (compose mode only; bake mode owns its own).
    - name: Cleanup socat
      if: ${{ always() && inputs.mode == 'compose' }}
      shell: bash
      run: |
        socat_id="${{ steps.socat.outputs.id }}"
        if [ -n "$socat_id" ]; then
          docker rm -f "$socat_id" || true
        fi

    # Default summary-name to the target-dir basename (needs a shell step).
    - name: Resolve summary name
      if: ${{ always() }}
      id: summary
      shell: bash
      env:
        SUMMARY_NAME_INPUT: ${{ inputs.summary-name }}
        TARGET_DIR: ${{ inputs.target-dir }}
      run: |
        name="$SUMMARY_NAME_INPUT"
        if [ -z "$name" ]; then
          name=$(basename "$TARGET_DIR")
          [ "$name" = "." ] && name="root"
        fi
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Cache-hit summary
      if: ${{ always() }}
      uses: bonisoft3/sayt/.github/actions/sayt/summary@v0.14.0
      with:
        name: ${{ steps.summary.outputs.name }}
        builder: ${{ steps.buildx.outputs.name }}
        debug: ${{ inputs.debug }}
