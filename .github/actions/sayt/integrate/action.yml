name: sayt-integrate
description: Run integration tests via docker compose (basic) or buildx bake (advanced).
inputs:
  target-dir:
    description: Directory containing compose.yaml for the integration flow.
    required: false
    default: "."
  mode:
    description: Execution mode (normal or advanced).
    required: false
    default: "normal"
  debug:
    description: Enable extra debug logging for bake/cache.
    required: false
    default: "false"
  bake-allow:
    description: "Buildx --allow value for advanced mode (for example: network.host)."
    required: false
    default: "network.host"
  buildkitd-flags:
    description: Optional buildkitd flags for setup-buildx-action.
    required: false
    default: ""
  target:
    description: Compose service to build and run.
    required: false
    default: "ci"
  wrapper-path:
    description: Path to the directory containing saytw and saytw.ps1 (advanced mode only).
    required: false
    default: "."
  distro-path:
    description: Path to a full sayt distribution containing sayt.sh. When set, sayt.sh is used directly and the distro seeds the install cache.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx (basic)
      if: ${{ inputs.mode != 'advanced' }}
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: --allow-insecure-entitlement network.host
        # mirror.gcr.io is Google's free, unrate-limited read-only
        # mirror of Docker Hub. docker/login-action's creds only apply
        # to the host docker daemon, not to the buildkit container
        # that this action creates — so every FROM/COPY-from buildkit
        # resolves goes anonymous and hits Docker Hub's 100-per-6h
        # cap. Routing through the mirror sidesteps that entirely.
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]

    - name: Build integrate target (basic)
      if: ${{ inputs.mode != 'advanced' }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        targets: ${{ inputs.target }}
        load: true
        allow: |
          network.host
          fs.read=${{ github.workspace }}
        set: |
          *.cache-from=type=gha
          *.cache-to=type=gha,mode=max

    - name: Run integration tests (basic)
      if: ${{ inputs.mode != 'advanced' }}
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      run: >-
        docker compose up
        ${{ inputs.target }}
        --abort-on-container-failure
        --exit-code-from ${{ inputs.target }}
        --force-recreate
        --build
        --renew-anon-volumes
        --remove-orphans
        --attach-dependencies
      env:
        COMPOSE_BAKE: "true"

    - name: Expose GitHub Runtime
      if: ${{ inputs.mode == 'advanced' }}
      uses: crazy-max/ghaction-github-runtime@v3

    - name: Set up Docker Buildx
      if: ${{ inputs.mode == 'advanced' }}
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        # See note above on the mirror.gcr.io rationale.
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]

    - name: Install sayt (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      uses: ./.github/actions/sayt/install
      with:
        wrapper-path: ${{ inputs.wrapper-path }}
        distro-path: ${{ inputs.distro-path }}

    - name: Compute cache scope (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      id: cache
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          scope="pr-${{ github.event.pull_request.number }}"
        elif [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
          scope="main"
        else
          scope="branch-${{ github.ref_name }}"
        fi
        echo "scope=$scope" >> "$GITHUB_OUTPUT"

    - name: Generate HOST_ENV (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      id: dind
      shell: bash
      run: |
        distro="${{ inputs.distro-path }}"
        if [ -n "$distro" ] && [ -x "${{ github.workspace }}/$distro/sayt.sh" ]; then
          sayt="${{ github.workspace }}/$distro/sayt.sh"
        else
          sayt="${{ github.workspace }}/${{ inputs.wrapper-path }}/saytw"
        fi
        host_env=$("$sayt" dind-env-file --socat)
        {
          echo "HOST_ENV<<EOF"
          echo "$host_env"
          echo "EOF"
        } >> "$GITHUB_ENV"
        # Bayt-emitted compose fragments mount host.env via
        # `file: ${BAYT_HOST_ENV_FILE}`. Materialize the env-file content
        # so the secret resolves at compose-config time.
        host_env_file="${RUNNER_TEMP:-/tmp}/bayt-host-env"
        printf '%s\n' "$host_env" > "$host_env_file"
        echo "BAYT_HOST_ENV_FILE=$host_env_file" >> "$GITHUB_ENV"
        socat_id=$(echo "$host_env" | grep '^SOCAT_CONTAINER_ID=' | cut -d= -f2-)
        echo "socat-id=$socat_id" >> "$GITHUB_OUTPUT"

    # Bake doesn't dedupe services declared by multiple included compose
    # files (shared bayt-runtime-stub etc.), so bake-direct on the
    # federated compose graph errors with "services.X conflicts with
    # imported resource". Flatten via `docker compose config` first —
    # compose's include resolution produces a single deduped service set
    # that bake handles cleanly. Mirrors plugins/sayt/integrate.nu.
    - name: Flatten compose graph for bake (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      id: flatten
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      run: |
        flat="${RUNNER_TEMP:-/tmp}/bayt-flat-compose.yaml"
        docker compose config -o "$flat"
        echo "flat=$flat" >> "$GITHUB_OUTPUT"

    - name: Run bake (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: |
          ${{ steps.flatten.outputs.flat }}
          docker-bake.override.hcl
        targets: ${{ inputs.target }}
        allow: |
          ${{ inputs.bake-allow }}
          fs.read=${{ github.workspace }}
      env:
        CACHE_SCOPE: ${{ steps.cache.outputs.scope }}
        HOST_ENV: ${{ env.HOST_ENV }}
        SOURCE_DATE_EPOCH: "0"
        BUILDKIT_PROGRESS: ${{ inputs.debug == 'true' && 'plain' || '' }}

    - name: Cleanup socat (advanced)
      if: ${{ inputs.mode == 'advanced' && always() }}
      shell: bash
      run: |
        socat_id="${{ steps.dind.outputs.socat-id }}"
        if [ -n "$socat_id" ]; then
          docker rm -f "$socat_id" || true
        fi
