name: sayt-integrate
description: Run integration tests via docker compose (basic) or buildx bake (advanced).
inputs:
  target-dir:
    description: Directory containing compose.yaml for the integration flow.
    required: false
    default: "."
  mode:
    description: Execution mode (normal or advanced).
    required: false
    default: "normal"
  debug:
    description: Enable extra debug logging for bake/cache.
    required: false
    default: "false"
  bake-allow:
    description: "Buildx --allow value for advanced mode (for example: network.host)."
    required: false
    default: "network.host"
  buildkitd-flags:
    description: Optional buildkitd flags for setup-buildx-action.
    required: false
    default: ""
  target:
    description: Compose service to build and run.
    required: false
    default: "ci"
  wrapper-path:
    description: Path to the directory containing saytw and saytw.ps1 (advanced mode only).
    required: false
    default: "."
  distro-path:
    description: Path to a full sayt distribution containing sayt.sh. When set, sayt.sh is used directly and the distro seeds the install cache.
    required: false
    default: ""
  cache:
    description: "Basic mode only. When 'true' (default), the action drives the bake digest probe + marker + compose-up dance. When 'false', skip all action-driven cache plumbing and run `docker compose up --build target` directly — the project's bayt-emitted compose.yaml is expected to carry per-service `x-bake.cache-from`/`cache-to` so bake's native cache layer does the work."
    required: false
    default: "true"
  cached:
    description: "Basic mode only. When 'true' (default), skip the docker compose up step if a prior successful run with the same bake-produced image digests is cached. Set to 'false' to always run the test. Ignored when `cache: false`."
    required: false
    default: "true"
  cache-scope:
    description: "Cache scope prefix used by the default `cache-from` / `cache-to` (e.g. 'pr-1261', 'iris-cache-v10'). Empty disables the defaults — the action does no cache wiring unless `cache-from` / `cache-to` are set explicitly. In advanced mode, retains its existing semantics (GHA cache scope consumed by bayt-generated `bake.<target>.hcl` files)."
    required: false
    default: ""
  cache-from:
    description: "Newline-separated bake cache-from specs for the leaf target. Default: GHA cache with per-scope + main fallback when `cache-scope` is set. Set explicitly to override (e.g. `type=registry,ref=…`). Set to null/empty to disable action-driven cache-from; compose `x-bake.cache-from` takes over."
    required: false
    default: ""
  cache-to:
    description: "Single bake cache-to spec for the leaf target. Default: GHA cache with per-scope mode=max when `cache-scope` is set. Set explicitly to override. Set to null/empty to disable; compose `x-bake.cache-to` takes over. Phase 2 always wipes cache-to via `--set '*.cache-to='`."
    required: false
    default: ""
  cache-target-pattern:
    description: "Bake target name pattern that cache-from/cache-to is applied to. Default: the single `target` value (matches one target, as in shall). For projects with a multi-target cascade (e.g. iris's dindbox → ci → integrate → build → setup), set to `*` so cache wiring propagates to every target the bake graph walks."
    required: false
    default: ""
  summary-name:
    description: "Project label for the cache-hit summary section in GITHUB_STEP_SUMMARY and the uploaded .dockerbuild artifact suffix. Defaults to the basename of `target-dir` (e.g. `shall`, `hello`)."
    required: false
    default: ""
runs:
  using: composite
  steps:
    # mirror.gcr.io: buildkit-side image pulls bypass the host docker
    # daemon's creds, so anonymous pulls hit Docker Hub's 100/6h cap
    # without this mirror.
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3
      with:
        # Pin the builder name so the buildx instance file lives at a
        # known path (/$HOME/.docker/buildx/instances/sayt-builder).
        # The capture step below, the BUILDX_BUILDER env passed to
        # compose, and any consumer's `--mount=type=secret` `target=`
        # for the instance file all reference this same name.
        name: sayt-builder
        # Basic mode requires network.host for `allow: network.host`
        # below; advanced callers manage their own buildkitd flags.
        buildkitd-flags: ${{ inputs.mode != 'advanced' && '--allow-insecure-entitlement network.host' || inputs.buildkitd-flags }}
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]

    # Hydrate BUILDX_INSTANCE / DOCKER_AUTH_CONFIG from the host's
    # buildx instance file + docker auth, if present. Must run BEFORE
    # any compose-up (basic and cache:true paths both reach dindbox)
    # so the env vars are set when dindbox starts and its inner-bake
    # reads them. The dindbox service passes these through as plain
    # env vars (compose secrets aren't usable: `environment:` source
    # errors on unset and `file:` source breaks on missing path /
    # inception nesting). dind-entrypoint reconstructs both files
    # inside the container. Missing host inputs = empty env var = no
    # hydration = buildx falls back to its default.
    - name: Capture host buildx instance + docker auth for dindbox
      if: ${{ inputs.mode != 'advanced' }}
      shell: bash
      run: |
        # Trailing newline before each heredoc delimiter — GITHUB_ENV
        # requires the delimiter to start a line, and instance/config
        # files may lack a trailing newline.
        instance="$HOME/.docker/buildx/instances/sayt-builder"
        if [ -f "$instance" ]; then
          {
            echo "BUILDX_INSTANCE<<BUILDX_INSTANCE_EOF"
            cat "$instance"
            echo
            echo "BUILDX_INSTANCE_EOF"
          } >> "$GITHUB_ENV"
        fi
        config="$HOME/.docker/config.json"
        if [ -f "$config" ]; then
          {
            echo "DOCKER_AUTH_CONFIG<<DOCKER_AUTH_CONFIG_EOF"
            cat "$config"
            echo
            echo "DOCKER_AUTH_CONFIG_EOF"
          } >> "$GITHUB_ENV"
        fi

    # Advanced setup must complete before flatten: bayt-emitted compose
    # fragments reference ${BAYT_HOST_ENV_FILE}, which `docker compose
    # config` substitutes at flatten time.
    - name: Expose GitHub Runtime
      if: ${{ inputs.mode == 'advanced' }}
      uses: crazy-max/ghaction-github-runtime@v3

    - name: Install sayt (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      uses: ./.github/actions/sayt/install
      with:
        wrapper-path: ${{ inputs.wrapper-path }}
        distro-path: ${{ inputs.distro-path }}

    - name: Compute cache scope (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      id: cache
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          scope="pr-${{ github.event.pull_request.number }}"
        elif [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
          scope="main"
        else
          scope="branch-${{ github.ref_name }}"
        fi
        echo "scope=$scope" >> "$GITHUB_OUTPUT"

    - name: Generate HOST_ENV (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      id: dind
      shell: bash
      run: |
        distro="${{ inputs.distro-path }}"
        if [ -n "$distro" ] && [ -x "${{ github.workspace }}/$distro/sayt.sh" ]; then
          sayt="${{ github.workspace }}/$distro/sayt.sh"
        else
          sayt="${{ github.workspace }}/${{ inputs.wrapper-path }}/saytw"
        fi
        host_env=$("$sayt" dind-env-file --socat)
        {
          echo "HOST_ENV<<EOF"
          echo "$host_env"
          echo "EOF"
        } >> "$GITHUB_ENV"
        # Extract DOCKER_HOST and re-export as BAYT_DOCKER_HOST.
        # Bake targets with env-sourced `docker_host` secrets
        # (compose-spec `secrets.docker_host.environment: BAYT_DOCKER_HOST`)
        # need the value as an individual env var. We deliberately
        # use BAYT_DOCKER_HOST rather than DOCKER_HOST so we don't
        # override docker CLI's own DOCKER_HOST — that would point
        # buildx at the remote socat'd daemon and force the docker
        # driver (which can't export GHA cache).
        docker_host=$(echo "$host_env" | grep '^DOCKER_HOST=' | cut -d= -f2-)
        echo "BAYT_DOCKER_HOST=$docker_host" >> "$GITHUB_ENV"
        # Materialize host.env so `file: ${BAYT_HOST_ENV_FILE}` in
        # bayt-emitted compose fragments resolves at flatten time.
        host_env_file="${RUNNER_TEMP:-/tmp}/bayt-host-env"
        printf '%s\n' "$host_env" > "$host_env_file"
        echo "BAYT_HOST_ENV_FILE=$host_env_file" >> "$GITHUB_ENV"
        socat_id=$(echo "$host_env" | grep '^SOCAT_CONTAINER_ID=' | cut -d= -f2-)
        echo "socat-id=$socat_id" >> "$GITHUB_OUTPUT"

    # Flatten via `docker compose config -o` before bake. Avoids two
    # bake-on-federated-compose bugs: cross-project additional_contexts
    # paths get doubled, and included compose files with overlapping
    # services collide. Mirrors plugins/sayt/integrate.nu.
    - name: Flatten compose graph
      id: flatten
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      run: |
        flat="${RUNNER_TEMP:-/tmp}/sayt-integrate-flat-compose.yaml"
        docker compose config -o "$flat"
        echo "flat=$flat" >> "$GITHUB_OUTPUT"

    # Resolve cache wiring into per-phase --set lines. If cache-from /
    # cache-to are empty and cache-scope is set, defaults to GHA cache
    # (per-scope + main fallback). Empty inputs hand off to compose
    # `x-bake.cache-{from,to}`. p2 always appends `*.cache-to=` so
    # phase 2 stays read-only — its output=type=docker writes drift
    # next run's digest if allowed to populate cache.
    - name: Compute cache wiring (basic)
      if: ${{ inputs.mode != 'advanced' && inputs.cache != 'false' }}
      id: cache-wiring
      shell: bash
      env:
        CACHE_SCOPE: ${{ inputs.cache-scope }}
        CACHE_FROM_INPUT: ${{ inputs.cache-from }}
        CACHE_TO_INPUT: ${{ inputs.cache-to }}
        TARGET: ${{ inputs.target }}
        CACHE_TARGET_PATTERN: ${{ inputs.cache-target-pattern }}
      run: |
        cache_from="$CACHE_FROM_INPUT"
        cache_to="$CACHE_TO_INPUT"
        # Pattern defaults to the leaf TARGET (one-target setups like shall).
        # Set to `*` for multi-target cascades (iris) so cache wiring
        # propagates to every bake-target the graph walks.
        target_pattern="${CACHE_TARGET_PATTERN:-$TARGET}"
        if [ -z "$cache_from" ] && [ -n "$CACHE_SCOPE" ]; then
          cache_from=$(printf 'type=gha,scope=%s-%s\ntype=gha,scope=main-%s\n' \
            "$CACHE_SCOPE" "$TARGET" "$TARGET")
        fi
        if [ -z "$cache_to" ] && [ -n "$CACHE_SCOPE" ]; then
          cache_to="type=gha,scope=${CACHE_SCOPE}-${TARGET},mode=max"
        fi
        p1=""
        p2=""
        while IFS= read -r line; do
          line="$(printf '%s' "$line" | xargs)"
          if [ -n "$line" ]; then
            p1+="${target_pattern}.cache-from=${line}"$'\n'
            p2+="${target_pattern}.cache-from=${line}"$'\n'
          fi
        done <<< "$cache_from"
        if [ -n "$cache_to" ]; then
          p1+="${target_pattern}.cache-to=${cache_to}"$'\n'
        fi
        p2+="*.cache-to="$'\n'
        {
          echo "p1<<PHASE1_EOF"
          printf '%s' "$p1"
          echo "PHASE1_EOF"
          echo "p2<<PHASE2_EOF"
          printf '%s' "$p2"
          echo "PHASE2_EOF"
        } >> "$GITHUB_OUTPUT"

    # Phase 1 — digest probe. `output=type=image,push=false` produces
    # bake metadata with `containerimage.digest` (the marker key) and
    # populates buildkit's local content store. Phase 2 loads from it.
    - name: Build integrate target — digest probe (basic)
      if: ${{ inputs.mode != 'advanced' && inputs.cache != 'false' }}
      id: bake
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: ${{ steps.flatten.outputs.flat }}
        targets: ${{ inputs.target }}
        load: false  # phase 2's job
        allow: |
          network.host
          fs.read=${{ github.workspace }}
        # rewrite-timestamp must match phase 2's set: line — different
        # values produce different containerimage.digest values and
        # break the marker.
        set: |
          *.output=type=image,push=false,rewrite-timestamp=true
          ${{ steps.cache-wiring.outputs.p1 }}
        provenance: false
        sbom: false
      env:
        SOURCE_DATE_EPOCH: "0"

    # Marker key = sha256 of per-target containerimage.digest map.
    # Metadata via tempfile (not env var) — outputs.metadata can exceed
    # ARG_MAX when cache provenance is large.
    - name: Compute digest hash (basic)
      if: ${{ inputs.mode != 'advanced' && inputs.cache != 'false' && inputs.cached == 'true' }}
      id: digest
      shell: bash
      run: |
        metadata_file="${RUNNER_TEMP:-/tmp}/sayt-integrate-bake-metadata.json"
        cat > "$metadata_file" <<'SAYT_BAKE_METADATA_EOF'
        ${{ steps.bake.outputs.metadata }}
        SAYT_BAKE_METADATA_EOF
        if [ ! -s "$metadata_file" ] || [ "$(head -c1 "$metadata_file")" != "{" ]; then
          echo "::warning::bake-action produced no/invalid metadata output; skipping cache wiring."
          exit 0
        fi
        hash=$(jq -S 'to_entries
                      | map({k: .key, d: (.value."containerimage.digest" // null)})
                      | sort_by(.k)' "$metadata_file" \
               | sha256sum | cut -d' ' -f1)
        echo "computed digest hash: $hash"
        echo "SAYT_INTEGRATE_DIGEST_HASH=$hash" >> "$GITHUB_ENV"

    - name: Restore passed marker (basic)
      if: ${{ inputs.mode != 'advanced' && inputs.cache != 'false' && inputs.cached == 'true' && env.SAYT_INTEGRATE_DIGEST_HASH != '' }}
      id: marker
      uses: actions/cache/restore@v4
      with:
        path: ${{ runner.temp }}/sayt-integrate-passed
        key: integrate-passed-${{ runner.os }}-${{ runner.arch }}-${{ env.SAYT_INTEGRATE_DIGEST_HASH }}

    # Phase 2 — load image into the daemon for `compose up`. Only runs
    # on marker miss; reuses phase 1's local content store.
    - name: Build integrate target — load image (basic)
      if: ${{ inputs.mode != 'advanced' && inputs.cache != 'false' && (inputs.cached != 'true' || steps.marker.outputs.cache-hit != 'true') }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: ${{ steps.flatten.outputs.flat }}
        targets: ${{ inputs.target }}
        load: true
        allow: |
          network.host
          fs.read=${{ github.workspace }}
        # p2 wipes cache-to via `*.cache-to=` (in cache-wiring step).
        # Phase 2 must stay cache-read-only: output=type=docker writes
        # entries the next run's phase 1 can't consume cleanly,
        # drifting the digest.
        set: |
          *.output=type=docker,rewrite-timestamp=true
          ${{ steps.cache-wiring.outputs.p2 }}
        provenance: false
        sbom: false
      env:
        SOURCE_DATE_EPOCH: "0"

    # No --build: compose looks the image up by `image:` tag, which
    # bake already produced. Re-invoking compose-bake here would risk
    # a different digest and defeat the marker.
    - name: Run integration tests (basic)
      if: ${{ inputs.mode != 'advanced' && inputs.cache != 'false' && (inputs.cached != 'true' || steps.marker.outputs.cache-hit != 'true') }}
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      env:
        # bayt-emitted dindbox compose env interpolates ${BUILDX_BUILDER:-};
        # without this it resolves to empty and the inner-bake uses the
        # default docker driver → "Cache export is not supported".
        BUILDX_BUILDER: sayt-builder
      run: >-
        docker compose up
        ${{ inputs.target }}
        --abort-on-container-failure
        --exit-code-from ${{ inputs.target }}
        --force-recreate
        --renew-anon-volumes
        --remove-orphans
        --attach-dependencies

    # Save marker only on success of an actual test-step run.
    - name: Touch passed marker (basic)
      if: ${{ success() && inputs.mode != 'advanced' && inputs.cache != 'false' && inputs.cached == 'true' && env.SAYT_INTEGRATE_DIGEST_HASH != '' && steps.marker.outputs.cache-hit != 'true' }}
      shell: bash
      run: touch "${{ runner.temp }}/sayt-integrate-passed"

    - name: Save passed marker (basic)
      if: ${{ success() && inputs.mode != 'advanced' && inputs.cache != 'false' && inputs.cached == 'true' && env.SAYT_INTEGRATE_DIGEST_HASH != '' && steps.marker.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ${{ runner.temp }}/sayt-integrate-passed
        key: integrate-passed-${{ runner.os }}-${{ runner.arch }}-${{ env.SAYT_INTEGRATE_DIGEST_HASH }}

    # cache: false path. The project's bayt-emitted compose.yaml
    # carries per-service `x-bake.cache-from` / `cache-to`. Invoke
    # bake directly (against the flattened compose) so it picks up
    # those keys and the docker-container builder created by
    # setup-buildx-action; `docker compose up --build` would route
    # through compose's legacy build path and silently ignore
    # x-bake config.
    - name: Bake target (basic, no action-driven cache)
      if: ${{ inputs.mode != 'advanced' && inputs.cache == 'false' }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: ${{ steps.flatten.outputs.flat }}
        targets: ${{ inputs.target }}
        load: true
        allow: |
          network.host
          fs.read=${{ github.workspace }}

    - name: Compose up (basic, no action-driven cache)
      if: ${{ inputs.mode != 'advanced' && inputs.cache == 'false' }}
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      env:
        BUILDX_BUILDER: sayt-builder
      run: >-
        docker compose up
        ${{ inputs.target }}
        --abort-on-container-failure
        --exit-code-from ${{ inputs.target }}
        --force-recreate
        --renew-anon-volumes
        --remove-orphans
        --attach-dependencies

    - name: Run bake (advanced)
      if: ${{ inputs.mode == 'advanced' }}
      uses: docker/bake-action@v6
      with:
        source: .
        workdir: ${{ inputs.target-dir }}
        files: |
          ${{ steps.flatten.outputs.flat }}
          docker-bake.override.hcl
        targets: ${{ inputs.target }}
        allow: |
          ${{ inputs.bake-allow }}
          fs.read=${{ github.workspace }}
      env:
        CACHE_SCOPE: ${{ steps.cache.outputs.scope }}
        HOST_ENV: ${{ env.HOST_ENV }}
        SOURCE_DATE_EPOCH: "0"
        BUILDKIT_PROGRESS: ${{ inputs.debug == 'true' && 'plain' || '' }}

    - name: Cleanup socat (advanced)
      if: ${{ inputs.mode == 'advanced' && always() }}
      shell: bash
      run: |
        socat_id="${{ steps.dind.outputs.socat-id }}"
        if [ -n "$socat_id" ]; then
          docker rm -f "$socat_id" || true
        fi

    # Resolve summary-name to basename of target-dir before passing in —
    # `${{ }}` expressions can't run shell, so compute via a tiny step.
    - name: Resolve summary name
      if: ${{ always() }}
      id: summary
      shell: bash
      env:
        SUMMARY_NAME_INPUT: ${{ inputs.summary-name }}
        TARGET_DIR: ${{ inputs.target-dir }}
      run: |
        name="$SUMMARY_NAME_INPUT"
        if [ -z "$name" ]; then
          name=$(basename "$TARGET_DIR")
          [ "$name" = "." ] && name="root"
        fi
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Cache-hit summary
      if: ${{ always() }}
      uses: ./.github/actions/sayt/summary
      with:
        name: ${{ steps.summary.outputs.name }}
        builder: ${{ steps.buildx.outputs.name }}
