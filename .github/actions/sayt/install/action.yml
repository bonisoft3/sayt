name: sayt/install
description: |
  Install sayt outside the workspace and expose it via GITHUB_PATH, with
  caching. The checkout stays byte-identical; the repo's `.say.yaml`
  version pin remains the version authority.
inputs:
  wrapper-path:
    description: Path to the directory containing saytw and saytw.ps1.
    required: false
    default: "."
  version:
    description: Semver (e.g., 0.0.17 or v0.0.17). Empty uses the wrapper default.
    required: false
    default: ""
  distro-path:
    description: Path to a full sayt distribution to copy into the cache before installing.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Cache saytw downloads
      id: cache-saytw
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sayt
          ~/Library/Caches/sayt
          ~/.local/share/mise
          ~/Library/Application Support/mise
          ${{ env.LOCALAPPDATA }}\sayt
          ${{ env.LOCALAPPDATA }}\mise
        key: saytw-v5-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}-${{ hashFiles(format('{0}/saytw', inputs.wrapper-path), format('{0}/saytw.ps1', inputs.wrapper-path)) }}-${{ hashFiles(format('{0}/*.toml', inputs.distro-path)) }}

    - name: Prepopulate saytw cache from distro
      if: ${{ inputs.distro-path != '' }}
      shell: bash
      env:
        DISTRO_PATH: ${{ inputs.distro-path }}
      run: |
        distro_dir="$DISTRO_PATH"
        if [ "$RUNNER_OS" = "Windows" ]; then
          cache_dir="$LOCALAPPDATA/sayt"
          mkdir -p "$cache_dir"
          cp -a "$distro_dir"/. "$cache_dir/"
          rm -rf "$cache_dir/.git"
        else
          mkdir -p ~/.cache/sayt ~/Library/Caches/sayt
          cp -a "$distro_dir"/. ~/.cache/sayt/
          rm -rf ~/.cache/sayt/.git
          cp -a "$distro_dir"/. ~/Library/Caches/sayt/
          rm -rf ~/Library/Caches/sayt/.git
        fi

    - name: Install sayt on PATH
      shell: bash
      env:
        WRAPPER_PATH: ${{ inputs.wrapper-path }}
        DISTRO_PATH: ${{ inputs.distro-path }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        tool_dir="$RUNNER_TEMP/sayt-tool"
        mkdir -p "$tool_dir"
        if [ -n "$DISTRO_PATH" ]; then
          # Distro mode: shim through the checkout's own launcher.
          printf '#!/bin/sh\nexec "%s/sayt.sh" "$@"\n' "$GITHUB_WORKSPACE/$DISTRO_PATH" > "$tool_dir/sayt"
          chmod +x "$tool_dir/sayt"
        else
          # Empty means "use the wrapper default" — an empty export would
          # otherwise reach the launcher run below with empty in scope.
          if [ -n "$INPUT_VERSION" ]; then
            export SAYT_VERSION="$INPUT_VERSION"
          fi
          cd "$WRAPPER_PATH"
          if [ -x ./saytw ]; then
            ./saytw --help
          else
            curl -fsSL https://raw.githubusercontent.com/bonisoft3/sayt/refs/heads/main/install | sh -s -- --help
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp -f "$LOCALAPPDATA/sayt/sayt.exe" "$tool_dir/sayt.exe"
          else
            cp -f "${XDG_CACHE_HOME:-$HOME/.cache}/sayt/sayt" "$tool_dir/sayt"
            chmod +x "$tool_dir/sayt"
          fi
          # Colocate the wrappers so a `.say.yaml` version pin can re-exec.
          if [ -f ./saytw ]; then
            cp -f ./saytw "$tool_dir/saytw"
            chmod +x "$tool_dir/saytw"
          fi
          if [ -f ./saytw.ps1 ]; then
            cp -f ./saytw.ps1 "$tool_dir/saytw.ps1"
          fi
        fi
        echo "$tool_dir" >> "$GITHUB_PATH"
        if [ "$RUNNER_OS" = "Windows" ]; then
          "$tool_dir/sayt.exe" --help
        else
          "$tool_dir/sayt" --help
        fi
