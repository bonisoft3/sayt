name: sayt/depot
description: |
  Run sayt/ci on depot's remote builders. Sets up the depot buildx instance and
  routes sayt/ci's outer + inner bakes through it under one depot cache scope —
  the inner dindbox bake builds + writes cache + loads, then runs. Requires a
  `DEPOT_TOKEN` env secret and a depot project id.

inputs:
  target-dir:
    description: Directory containing the project's compose.yaml.
    required: true
  phase:
    description: |
      `full` (default): dindbox `sayt/ci` — build + compose-up in one job.
      `run`: same dindbox path, targeting a `ci-run` (pulls a pushed closure).
      `build`: host `depot bake` of the project's committed `.bayt/depot.hcl`
      `depot-build` group — builds + pushes the runtime closure with no dindbox
      (the phase runs no containers, so it needs no daemon). Requires the project
      to opt into `#project.depot` so depot.yaml/depot.hcl exist.
    required: false
    default: "full"
  target:
    description: Bake target for sayt/ci (dindbox phases). Defaults to `ci`.
    required: false
    default: "ci"
  depot-project:
    description: Depot project ID (e.g. `f5k5087x1b` for iris/tracker).
    required: true
  buildkitd-flags:
    description: Passthrough to `sayt/ci`. Optional extra buildkitd flags.
    required: false
    default: ""
  buildkit-syntax:
    description: |
      Dockerfile frontend pin, passed to `sayt/ci`. Pinned by default (unlike
      other flows): depot's fleet rolls mid-run, so outer/inner must share one
      frontend or their cache namespaces split. Bump deliberately — it
      cold-starts the depot cache.
    required: false
    default: "docker/dockerfile:1.24@sha256:87999aa3d42bdc6bea60565083ee17e86d1f3339802f543c0d03998580f9cb89"
  summary-name:
    description: Passthrough to `sayt/ci`. Cache-hit summary section label.
    required: false
    default: ""
  debug:
    description: Passthrough to `sayt/ci` (and through to sayt/summary).
    required: false
    default: "false"
  distro-path:
    description: |
      Passthrough to `sayt/ci` — seeds the sayt distribution so the inner runs
      this repo's sayt (not a published one). Without it the inner falls back to
      the installed sayt, which can break inner secret/frontend threading.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install depot CLI
      uses: depot/setup-action@v1

    - name: Log in to Depot Registry
      uses: docker/login-action@v3
      with:
        registry: registry.depot.dev
        username: x-token
        password: ${{ env.DEPOT_TOKEN }}

    # ---- build phase: flat host `depot bake`, no dindbox ----
    - name: Bake + push runtime closure
      if: ${{ inputs.phase == 'build' }}
      shell: bash
      env:
        DEPOT_TOKEN: ${{ env.DEPOT_TOKEN }}
        BAYT_COMPOSE_OUTPUT: registry
        BAYT_IMAGE_TAG: ${{ github.sha }}
        BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        SOURCE_DATE_EPOCH: "0"
      run: |
        set -euo pipefail
        d="${{ inputs.target-dir }}"
        # `depot-build` is the closure group bayt emits in depot.hcl — each
        # service's own output applies (compose-runtime → registry, build-only →
        # cacheonly). No registry cache: depot's builder-native cache suffices.
        # Frontend pinned via the arg depot honors (its embedded parser lacks
        # COPY --parents, and `# syntax=` can't be committed).
        depot bake -f "$d/.bayt/depot.yaml" -f "$d/.bayt/depot.hcl" \
          --project ${{ inputs.depot-project }} \
          --set "*.cache-from=" --set "*.cache-to=" \
          --set "*.args.BUILDKIT_SYNTAX=${{ inputs.buildkit-syntax }}" \
          depot-build

    # ---- run / full phases: dindbox via sayt/ci ----
    - name: depot configure-docker
      if: ${{ inputs.phase != 'build' }}
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      shell: bash
      run: depot configure-docker

    # Compose the depot cache scope from DECLARED inputs only (branch, project
    # id, frontend) — never probe depot: its fleet rolls mid-run, so a probed
    # value would split a run's bakes across cache namespaces.
    - name: Compute depot cache scope
      if: ${{ inputs.phase != 'build' }}
      id: scope
      shell: bash
      env:
        BUILDKIT_SYNTAX: ${{ inputs.buildkit-syntax }}
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      run: |
        if [ -n "$BUILDKIT_SYNTAX" ]; then
          digest="$(printf '%s' "$BUILDKIT_SYNTAX" | sed -n 's/.*@sha256:\([0-9a-f]\{12\}\).*/\1/p')"
          frontend="df${digest:-pin}"
        else
          frontend=builtin
        fi
        branch="${BRANCH:-main}"
        branch="${branch#refs/heads/}"
        branch="$(printf '%s' "$branch" | tr -c 'a-zA-Z0-9._-' '-')"
        [ -n "$branch" ] || branch=main
        # Bound the branch so the composed cache tag stays under Docker's
        # 128-char limit: ≤24 verbatim (so `main` equals its own fallback),
        # longer names collapse to slug16 + 8 hex of the full name's sha256.
        if [ "${#branch}" -gt 24 ]; then
          branch="$(printf '%s' "$branch" | cut -c1-16)-$(printf '%s' "$branch" | sha256sum | cut -c1-8)"
        fi
        engine="depot-${DEPOT_PROJECT_ID}"
        {
          echo "syntax=$BUILDKIT_SYNTAX"
          echo "scope=${branch}-${engine}-${frontend}"
          echo "fallback=main-${engine}-${frontend}"
        } | tee -a "$GITHUB_OUTPUT"

    - name: Capture depot builder for inner
      if: ${{ inputs.phase != 'build' }}
      id: depot-builder
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      shell: bash
      run: |
        name="depot_${DEPOT_PROJECT_ID}"
        file="$HOME/.docker/buildx/instances/$name"
        if [ ! -f "$file" ]; then
          echo "::error::depot instance file not found at $file" >&2
          ls "$HOME/.docker/buildx/instances/" >&2 || true
          exit 1
        fi
        {
          echo "name=$name"
          echo "instance<<DEPOT_INSTANCE_EOF"
          cat "$file"
          echo
          echo "DEPOT_INSTANCE_EOF"
        } >> "$GITHUB_OUTPUT"

    # Outer + inner via sayt/ci. Step-level env scopes BUILDX_INSTANCE/BUILDER
    # to this call only; routing the inner to depot via INNER_CACHE_SCOPE keeps
    # its bakes in the depot cache namespace.
    - uses: ./.github/actions/sayt/ci
      if: ${{ inputs.phase != 'build' }}
      env:
        BUILDX_BUILDER: ${{ steps.depot-builder.outputs.name }}
        BUILDX_INSTANCE: ${{ steps.depot-builder.outputs.instance }}
        INNER_CACHE_SCOPE: ${{ steps.scope.outputs.scope }}
        INNER_CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.fallback }}
        # Select the inner bake's depot path (the do-script runs `depot bake`
        # when $DEPOT_TOKEN is set); transported in as compose secrets by
        # integrate.nu.
        DEPOT_TOKEN: ${{ env.DEPOT_TOKEN }}
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
        # SAYT_NO_CACHE_FROM / SAYT_NO_CACHE_TO — skip the inner bake's registry
        # cache import + export. Redundant on depot: the builder-native cache
        # warms the compile, so the registry cache layer is dead weight both
        # ways. Inner-only (env scope); the outer keeps its registry cache.
        SAYT_NO_CACHE_FROM: "1"
        SAYT_NO_CACHE_TO: "1"
        # Deterministic image tag so a build phase (target=*-build, pushes the
        # compose closure) and a run phase (target=*-run, pulls it) on separate
        # jobs agree on the ref. Harmless for single-phase consumers: the loaded
        # image just gets tagged :$SHA instead of :latest.
        BAYT_IMAGE_TAG: ${{ github.sha }}
      with:
        target-dir: ${{ inputs.target-dir }}
        target: ${{ inputs.target }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkit-syntax: ${{ steps.scope.outputs.syntax }}
        distro-path: ${{ inputs.distro-path }}
        summary-name: ${{ inputs.summary-name }}
        debug: ${{ inputs.debug }}
