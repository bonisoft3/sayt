name: sayt-depot
description: |
  Depot-heavy variant of sayt/ci. Three-phase flow:

    1. WARMUP — `depot configure-docker` registers `depot_<project>` as
       the host's default buildx builder. `docker buildx bake <warmup-
       target>` runs on depot's remote infra and writes per-target
       registry refs declared in compose `x-bake.cache-from/cache-to`.
    2. OUTER — sayt/ci's setup-buildx-action creates a local docker-
       container buildkit. integrate.nu's explicit `--builder` flag
       overrides the env, so the outer's bake walks on local buildx
       reading from the registry refs the warmup populated.
    3. INNER — the dindbox sandbox env-sources BUILDX_INSTANCE +
       BUILDX_BUILDER as compose secrets. With those pointing at
       depot's instance file (captured here, scoped to the sayt/ci
       step via env:), the inner's `docker buildx bake` routes to
       depot and reads depot's native cache.

  No DEPOT_TOKEN propagation into the dindbox: depot lives only at the
  host runner layer. No depot CLI in the dindbox image.

  Requires:
    - DEPOT_TOKEN secret available as `env.DEPOT_TOKEN` (set by caller).
    - sayt/integrate's integrate.nu must prefer caller-set
      BUILDX_INSTANCE / BUILDX_BUILDER (env-override behavior).
    - Project's compose must declare per-target x-bake.cache-from/
      cache-to using the same registry refs across warmup-target and
      target so the warmup's writes are what the outer + inner read.

inputs:
  target-dir:
    description: Directory containing the project's compose.yaml.
    required: true
  target:
    description: Bake target for sayt/ci. Defaults to `ci`.
    required: false
    default: "ci"
  warmup-target:
    description: |
      Bake target for the depot warmup. Defaults to `integrate` — the
      runtime root whose transitive deps cover most of ci's build cost.
      Override with a project-specific service name (e.g.
      `guis_iris-integrate`) if compose uses prefixed service names.
    required: false
    default: "integrate"
  depot-project:
    description: Depot project ID (e.g. `f5k5087x1b` for iris/tracker).
    required: true
  buildkitd-flags:
    description: Passthrough to `sayt/ci`. Optional extra buildkitd flags.
    required: false
    default: ""
  buildkit-syntax:
    description: |
      External dockerfile frontend pin for the depot flow; '' uses the
      builders' built-in frontends. Depot is the one engine whose
      built-in frontend the repo can't freeze (the fleet rolls
      mid-flight, so warmup and inner can land on machines with
      different builtins), hence a pinned default here while every
      other flow defaults to builtin. Applied to the warmup bake AND
      passed through to `sayt/ci` — warmup, outer and inner must run
      the same frontend or their chain IDs (and therefore cache
      namespaces) split. Digest-pinned so BuildKit's content-
      addressable cache serves the frontend image with no tag→digest
      roundtrip; bump deliberately — the frontend feeds chain-ID
      computation, so a bump cold-starts the depot registry cache (the
      CACHE_SCOPE frontend dimension keeps old and new namespaces
      apart).
    required: false
    default: "docker/dockerfile:1.24@sha256:87999aa3d42bdc6bea60565083ee17e86d1f3339802f543c0d03998580f9cb89"
  summary-name:
    description: Passthrough to `sayt/ci`. Cache-hit summary section label.
    required: false
    default: ""
  debug:
    description: Passthrough to `sayt/ci` (and through to sayt/summary).
    required: false
    default: "false"
  push-images:
    description: |
      'true' pushes the warmup targets' images so shard compose-ups
      pull instead of building: those targets bake with
      output=type=registry, and the sayt/ci step env gains
      BAYT_IMAGE_TAG ($GITHUB_SHA) and BAYT_PULL_POLICY=missing. The
      registry comes from the project's bayt config (`bake: images:
      registry:`, defaulting to the cache registry). Pair with the
      project's `bake: images: pull: true` knob, and point the
      warmup-target at the launch-image set.
    required: false
    default: "false"
  no-cache-to:
    description: |
      'true' sets SAYT_NO_CACHE_TO on the sayt/ci step: its outer and
      inner bakes read cache but export none. Single-writer cache
      discipline — the warmup above stays the only writer. Recommended
      together with push-images on sharded projects.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install depot CLI
      uses: depot/setup-action@v1

    - name: Log in to Depot Registry
      uses: docker/login-action@v3
      with:
        registry: registry.depot.dev
        username: x-token
        password: ${{ env.DEPOT_TOKEN }}

    - name: depot configure-docker
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      shell: bash
      run: depot configure-docker

    # Depot cache scope from DECLARED inputs — branch, depot project
    # id, frontend pin. Never probe depot for a scope dimension: it
    # versions its own fleet and machines change mid-rollout, so a
    # `buildx inspect`-derived value splits the warmup's writes from
    # the inner's reads at random. This action is the one producer of
    # depot scopes: the warmup interpolates them below, and the inner
    # receives the same values via INNER_CACHE_SCOPE → integrate.nu →
    # bayt's cache_scope secret. A depot fleet roll shows up as a
    # one-time miss-and-rewrite within the same tag (visible in the
    # sayt/summary miss table), not a namespace split.
    - name: Compute depot cache scope
      id: scope
      shell: bash
      env:
        SYNTAX_INPUT: ${{ inputs.buildkit-syntax }}
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      run: |
        SAYT_BUILDKIT_SYNTAX="$SYNTAX_INPUT"
        if [ -n "$SAYT_BUILDKIT_SYNTAX" ]; then
          digest="$(printf '%s' "$SAYT_BUILDKIT_SYNTAX" | sed -n 's/.*@sha256:\([0-9a-f]\{12\}\).*/\1/p')"
          frontend="df${digest:-pin}"
        else
          frontend=builtin
        fi
        branch="${BRANCH:-main}"
        branch="${branch#refs/heads/}"
        branch="$(printf '%s' "$branch" | tr -c 'a-zA-Z0-9._-' '-' | cut -c1-40)"
        [ -n "$branch" ] || branch=main
        engine="depot-${DEPOT_PROJECT_ID}"
        {
          echo "syntax=$SAYT_BUILDKIT_SYNTAX"
          echo "scope=${branch}-${engine}-${frontend}"
          echo "fallback=main-${engine}-${frontend}"
        } | tee -a "$GITHUB_OUTPUT"

    - name: Warmup — depot bake ${{ inputs.warmup-target }}
      working-directory: ${{ inputs.target-dir }}
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
        BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        BUILDX_BAKE_ENTITLEMENTS_FS: "0"
        SOURCE_DATE_EPOCH: "0"
        SAYT_BUILDKIT_SYNTAX: ${{ steps.scope.outputs.syntax }}
        CACHE_SCOPE: ${{ steps.scope.outputs.scope }}
        CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.fallback }}
        BAYT_IMAGE_TAG: ${{ inputs.push-images == 'true' && github.sha || env.BAYT_IMAGE_TAG }}
        PUSH_IMAGES: ${{ inputs.push-images }}
      shell: bash
      # cacheonly keeps compose-runnable targets (bayt-default
      # `output: type=docker`) from materializing images on a full
      # cache hit. When pushing, the requested targets get per-target
      # type=registry sets INSTEAD of the wildcard: buildx appends
      # same-field --set flags and builders reject output lists, and
      # a `*` registry set would fail on `_srcs` local-only names.
      # Tags are cleared on push targets — they are daemon-local
      # aliases (type=docker flow) whose bare names a registry push
      # would resolve to docker.io and fail. Cache-to refs write under
      # either output.
      run: |
        out_sets=(--set "*.output=type=cacheonly")
        if [ "$PUSH_IMAGES" = "true" ]; then
          out_sets=()
          for t in ${{ inputs.warmup-target }}; do
            out_sets+=(--set "$t.output=type=registry" --set "$t.tags=")
          done
        fi
        time docker compose config \
          | docker buildx bake --allow=fs.read=${GITHUB_WORKSPACE} "${out_sets[@]}" ${SAYT_BUILDKIT_SYNTAX:+--set "*.args.BUILDKIT_SYNTAX=$SAYT_BUILDKIT_SYNTAX"} -f - ${{ inputs.warmup-target }}

    - name: Capture depot builder for inner
      id: depot-builder
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      shell: bash
      run: |
        name="depot_${DEPOT_PROJECT_ID}"
        file="$HOME/.docker/buildx/instances/$name"
        if [ ! -f "$file" ]; then
          echo "::error::depot instance file not found at $file" >&2
          ls "$HOME/.docker/buildx/instances/" >&2 || true
          exit 1
        fi
        {
          echo "name=$name"
          echo "instance<<DEPOT_INSTANCE_EOF"
          cat "$file"
          echo
          echo "DEPOT_INSTANCE_EOF"
        } >> "$GITHUB_OUTPUT"

    # Outer + inner via sayt/ci. Step-level env scopes
    # BUILDX_INSTANCE / BUILDX_BUILDER to this invocation only — they
    # don't propagate to other steps (no GITHUB_ENV write). Outer's
    # explicit --builder flag overrides BUILDX_BUILDER env; inner picks
    # the env up via compose secrets → dindbox inject body.
    # INNER_CACHE_SCOPE pairs with BUILDX_INSTANCE: routing the inner
    # to depot means the inner's cache namespace is depot's — the same
    # declared scope the warmup above wrote under. integrate.nu feeds
    # it to bayt's cache_scope secret at bake time.
    - uses: ./.github/actions/sayt/ci
      env:
        BUILDX_BUILDER: ${{ steps.depot-builder.outputs.name }}
        BUILDX_INSTANCE: ${{ steps.depot-builder.outputs.instance }}
        INNER_CACHE_SCOPE: ${{ steps.scope.outputs.scope }}
        INNER_CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.fallback }}
        # Fallbacks pass the caller's env through (step env beats job
        # env; a hardcoded '' would mask caller-provided values).
        BAYT_IMAGE_TAG: ${{ inputs.push-images == 'true' && github.sha || env.BAYT_IMAGE_TAG }}
        BAYT_PULL_POLICY: ${{ inputs.push-images == 'true' && 'missing' || env.BAYT_PULL_POLICY }}
        SAYT_NO_CACHE_TO: ${{ inputs.no-cache-to == 'true' && '1' || env.SAYT_NO_CACHE_TO }}
      with:
        target-dir: ${{ inputs.target-dir }}
        target: ${{ inputs.target }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkit-syntax: ${{ steps.scope.outputs.syntax }}
        summary-name: ${{ inputs.summary-name }}
        debug: ${{ inputs.debug }}
