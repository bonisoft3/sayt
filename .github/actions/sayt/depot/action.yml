name: sayt/depot
description: |
  Run sayt/ci on depot's remote builders, warming a registry cache first.
  The warmup bakes `warmup-target` on depot (writing the registry refs your
  compose's `x-bake.cache-*` declare); sayt/ci's outer + inner bakes then read
  those refs. Requires a `DEPOT_TOKEN` env secret and a depot project id;
  depot stays on the host runner (no token or CLI inside the dindbox), and your
  compose must use the same registry refs across warmup-target and target.

inputs:
  target-dir:
    description: Directory containing the project's compose.yaml.
    required: true
  target:
    description: Bake target for sayt/ci. Defaults to `ci`.
    required: false
    default: "ci"
  warmup-target:
    description: |
      Bake target to warm on depot. Defaults to `integrate`; override with a
      prefixed service name (e.g. `guis_iris-integrate`) if compose uses them.
    required: false
    default: "integrate"
  depot-project:
    description: Depot project ID (e.g. `f5k5087x1b` for iris/tracker).
    required: true
  buildkitd-flags:
    description: Passthrough to `sayt/ci`. Optional extra buildkitd flags.
    required: false
    default: ""
  buildkit-syntax:
    description: |
      Dockerfile frontend pin, applied to the warmup and passed to `sayt/ci`.
      Pinned by default (unlike other flows): depot's fleet rolls mid-run, so
      warmup/outer/inner must share one frontend or their cache namespaces
      split. Bump deliberately — it cold-starts the depot cache.
    required: false
    default: "docker/dockerfile:1.24@sha256:87999aa3d42bdc6bea60565083ee17e86d1f3339802f543c0d03998580f9cb89"
  summary-name:
    description: Passthrough to `sayt/ci`. Cache-hit summary section label.
    required: false
    default: ""
  debug:
    description: Passthrough to `sayt/ci` (and through to sayt/summary).
    required: false
    default: "false"
  distro-path:
    description: |
      Passthrough to `sayt/ci` — seeds the sayt distribution so the inner runs
      this repo's sayt (not a published one). Without it the inner falls back to
      the installed sayt, which can break inner secret/frontend threading.
    required: false
    default: ""
  push-images:
    description: |
      'true' pushes the warmup targets to a registry (output=type=registry) so
      shard compose-ups pull instead of build, and sets BAYT_IMAGE_TAG +
      BAYT_PULL_POLICY=missing on sayt/ci. Pair with the project's
      `bake: images: pull: true` and point warmup-target at the launch set.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install depot CLI
      uses: depot/setup-action@v1

    - name: Log in to Depot Registry
      uses: docker/login-action@v3
      with:
        registry: registry.depot.dev
        username: x-token
        password: ${{ env.DEPOT_TOKEN }}

    - name: depot configure-docker
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      shell: bash
      run: depot configure-docker

    # Compose the depot cache scope from DECLARED inputs only (branch, project
    # id, frontend) — never probe depot: its fleet rolls mid-run, so a probed
    # value would split the warmup's writes from the inner's reads.
    - name: Compute depot cache scope
      id: scope
      shell: bash
      env:
        BUILDKIT_SYNTAX: ${{ inputs.buildkit-syntax }}
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      run: |
        if [ -n "$BUILDKIT_SYNTAX" ]; then
          digest="$(printf '%s' "$BUILDKIT_SYNTAX" | sed -n 's/.*@sha256:\([0-9a-f]\{12\}\).*/\1/p')"
          frontend="df${digest:-pin}"
        else
          frontend=builtin
        fi
        branch="${BRANCH:-main}"
        branch="${branch#refs/heads/}"
        branch="$(printf '%s' "$branch" | tr -c 'a-zA-Z0-9._-' '-')"
        [ -n "$branch" ] || branch=main
        # Bound the branch so the composed cache tag stays under Docker's
        # 128-char limit: ≤24 verbatim (so `main` equals its own fallback),
        # longer names collapse to slug16 + 8 hex of the full name's sha256.
        if [ "${#branch}" -gt 24 ]; then
          branch="$(printf '%s' "$branch" | cut -c1-16)-$(printf '%s' "$branch" | sha256sum | cut -c1-8)"
        fi
        engine="depot-${DEPOT_PROJECT_ID}"
        {
          echo "syntax=$BUILDKIT_SYNTAX"
          echo "scope=${branch}-${engine}-${frontend}"
          echo "fallback=main-${engine}-${frontend}"
        } | tee -a "$GITHUB_OUTPUT"

    # Only when pushing: the warmup builds + pushes the launch-image set to
    # the registry (the depot-builder → runner transport the inner pulls).
    # When not pushing there is no transport to set up — the inner bake is
    # the cache writer and skips on a hit, which a standalone warmup never
    # can, so the warmup is pure redundant work and is skipped.
    - name: Warmup — depot bake ${{ inputs.warmup-target }}
      if: ${{ inputs.push-images == 'true' }}
      working-directory: ${{ inputs.target-dir }}
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
        BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        BUILDX_BAKE_ENTITLEMENTS_FS: "0"
        SOURCE_DATE_EPOCH: "0"
        BUILDKIT_SYNTAX: ${{ steps.scope.outputs.syntax }}
        CACHE_SCOPE: ${{ steps.scope.outputs.scope }}
        CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.fallback }}
        BAYT_IMAGE_TAG: ${{ inputs.push-images == 'true' && github.sha || env.BAYT_IMAGE_TAG }}
        PUSH_IMAGES: ${{ inputs.push-images }}
      shell: bash
      # cacheonly stops compose-runnable targets from materializing images on a
      # full hit. When pushing, set type=registry per-target (not `*`: builders
      # reject output lists, and `*` would hit local-only `_srcs` names). Leave
      # each target's tags intact: under images:pull the only tag is the
      # fragment's registry-qualified `image:` ref `<repo>:${BAYT_IMAGE_TAG}` —
      # the exact ref inner shards pull. Bare `x-bake.tags` (which would resolve
      # to docker.io on push) live only in the non-pull daemon-load path, which
      # this push-gated step never takes.
      run: |
        out_sets=(--set "*.output=type=cacheonly")
        if [ "$PUSH_IMAGES" = "true" ]; then
          out_sets=()
          # unquoted on purpose: warmup-target may be space-separated.
          for t in ${{ inputs.warmup-target }}; do
            out_sets+=(--set "$t.output=type=registry")
          done
        fi
        time docker compose config \
          | docker buildx bake --allow=fs.read=${GITHUB_WORKSPACE} "${out_sets[@]}" ${BUILDKIT_SYNTAX:+--set "*.args.BUILDKIT_SYNTAX=$BUILDKIT_SYNTAX"} -f - ${{ inputs.warmup-target }}

    - name: Capture depot builder for inner
      id: depot-builder
      env:
        DEPOT_PROJECT_ID: ${{ inputs.depot-project }}
      shell: bash
      run: |
        name="depot_${DEPOT_PROJECT_ID}"
        file="$HOME/.docker/buildx/instances/$name"
        if [ ! -f "$file" ]; then
          echo "::error::depot instance file not found at $file" >&2
          ls "$HOME/.docker/buildx/instances/" >&2 || true
          exit 1
        fi
        {
          echo "name=$name"
          echo "instance<<DEPOT_INSTANCE_EOF"
          cat "$file"
          echo
          echo "DEPOT_INSTANCE_EOF"
        } >> "$GITHUB_OUTPUT"

    # Outer + inner via sayt/ci. Step-level env scopes BUILDX_INSTANCE/BUILDER
    # to this call only; routing the inner to depot via INNER_CACHE_SCOPE keeps
    # its cache namespace the same one the warmup wrote under.
    - uses: ./.github/actions/sayt/ci
      env:
        BUILDX_BUILDER: ${{ steps.depot-builder.outputs.name }}
        BUILDX_INSTANCE: ${{ steps.depot-builder.outputs.instance }}
        INNER_CACHE_SCOPE: ${{ steps.scope.outputs.scope }}
        INNER_CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.fallback }}
        # Fall through to caller env (a hardcoded '' would mask it).
        BAYT_IMAGE_TAG: ${{ inputs.push-images == 'true' && github.sha || env.BAYT_IMAGE_TAG }}
        BAYT_PULL_POLICY: ${{ inputs.push-images == 'true' && 'missing' || env.BAYT_PULL_POLICY }}
        # With push-images the warmup is the sole cache writer, so the inner
        # reads only. Without it there is no warmup: the inner is the writer
        # (it skips on a cache hit — a standalone warmup can't).
        SAYT_NO_CACHE_TO: ${{ inputs.push-images == 'true' && '1' || '' }}
      with:
        target-dir: ${{ inputs.target-dir }}
        target: ${{ inputs.target }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkit-syntax: ${{ steps.scope.outputs.syntax }}
        distro-path: ${{ inputs.distro-path }}
        summary-name: ${{ inputs.summary-name }}
        debug: ${{ inputs.debug }}
